#
# Egress is restricted to: DNS, NATS, OTel collector, HTTPS (forwardemail.net + Auth0 JWKS).
# Ingress is denied — the service has no HTTP listener.
{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Chart.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # NATS broker
    - ports:
        - port: {{ .Values.networkPolicy.natsPort }}
          protocol: TCP
    # OpenTelemetry collector (gRPC and HTTP)
    - ports:
        - port: {{ .Values.networkPolicy.otelGRPCPort }}
          protocol: TCP
        - port: {{ .Values.networkPolicy.otelHTTPPort }}
          protocol: TCP
    # Outbound HTTPS: forwardemail.net REST API + Auth0 JWKS endpoint
    - ports:
        - port: {{ .Values.networkPolicy.httpsPort }}
          protocol: TCP
{{- end }}
